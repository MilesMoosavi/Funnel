<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funnel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: #0F0F0F;
      color: #F0F0F0;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .popup-container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #8B5CF6, rgba(139, 92, 246, 0.5));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.25);
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .version {
      font-size: 10px;
      color: #5A5A5A;
      margin-left: auto;
      background: #1A1A1A;
      padding: 2px 8px;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Status Section */
    .status-section {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(12px);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.online { background: #22C55E; }
    .status-dot.offline { background: #6B7280; }
    .status-dot.idle { background: #EAB308; }

    .status-label {
      font-size: 12px;
      color: #9A9A9A;
    }

    .status-value {
      font-size: 12px;
      font-weight: 600;
      margin-left: auto;
    }

    .status-value.connected { color: #22C55E; }
    .status-value.disconnected { color: #6B7280; }

    /* Tabs Section */
    .tabs-header {
      font-size: 10px;
      font-weight: 600;
      color: #5A5A5A;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 6px;
      transition: background 150ms ease;
    }

    .tab-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .tab-model {
      font-size: 12px;
      font-weight: 500;
    }

    .tab-status {
      font-size: 10px;
      color: #5A5A5A;
      margin-left: auto;
    }

    .empty-state {
      text-align: center;
      padding: 16px;
      color: #5A5A5A;
      font-size: 11px;
      line-height: 1.5;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 4px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .footer a {
      font-size: 10px;
      color: #8B5CF6;
      text-decoration: none;
      transition: opacity 150ms ease;
    }

    .footer a:hover {
      opacity: 0.8;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 6px rgba(34, 197, 94, 0.3); }
      50% { box-shadow: 0 0 12px rgba(34, 197, 94, 0.5); }
    }

    .status-dot.online {
      animation: pulse-glow 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>
        </svg>
      </div>
      <span class="title">FunnelLM</span>
      <span class="version">v0.1.0</span>
    </div>

    <!-- Connection Status -->
    <div class="status-section">
      <div class="status-row">
        <div id="webapp-dot" class="status-dot offline"></div>
        <span class="status-label">Web App</span>
        <span id="webapp-status" class="status-value disconnected">Disconnected</span>
      </div>
      <div class="status-row">
        <div id="uid-dot" class="status-dot offline"></div>
        <span class="status-label">Session UID</span>
        <span id="uid-value" class="status-value disconnected">—</span>
      </div>
    </div>

    <!-- Active LLM Tabs -->
    <div>
      <div class="tabs-header">Active LLM Tabs</div>
      <div id="tabs-list">
        <div class="empty-state">
          No LLM tabs detected.<br/>
          Open ChatGPT, Claude, or Gemini to get started.
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="http://localhost:3000" target="_blank">Open FunnelLM Dashboard →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
